    muv:
        compounds: 93111
        description: 'The MUV (Maximum Unbiased Validation) dataset is a carefully
            designed multi-target virtual screening benchmark containing 17 biological
            targets from PubChem BioAssay data. Published by Rohrer & Baumann (2009),
            this dataset addresses critical issues in virtual screening benchmarks
            by avoiding analogue bias and artificial enrichment through refined nearest
            neighbor analysis from spatial statistics. Each molecule has a 17-dimensional
            target vector where each position can have three values: 0 (not mentioned
            for that target), 1 (active against that target), or 2 (decoy for that
            target). This tri-state encoding properly captures the per-target nature
            of the decoy selection, where a molecule can be active against one target
            while serving as a decoy for another. With 30 carefully selected diverse
            actives and 15,000 embedded decoys per target (500:1 ratio), MUV provides
            a truly challenging and unbiased benchmark for evaluating similarity-based
            virtual screening methods and molecular fingerprints.'
        notes:
        - This is an unbiased virtual screening benchmark dataset designed to avoid
            analogue bias and artificial enrichment.
        - 'Target vectors use tri-state encoding: 0 = not mentioned for that target,
            1 = active against that target, 2 = decoy for that target.'
        - Actives are maximally spread (diverse) to avoid analogue bias, with 30 actives
            per target.
        - Decoys are embedded around actives using refined nearest neighbor analysis
            (500:1 ratio, 15,000 per target).
        - A molecule can be active against some targets while serving as a decoy for
            others, capturing the per-target nature of the data.
        - All targets are based on PubChem BioAssay confirmatory screens.
        raw:
        - csv
        sources:
        - https://github.com/rdkit/benchmarking_platform
        - https://doi.org/10.1021/ci8002649
        - https://pubs.acs.org/doi/10.1021/ci8002649
        - https://www.tu-braunschweig.de/en/pharmchem/forschung/baumann/translate-to-english-muv
        tags:
        - Molecules
        - SMILES
        - Drug Discovery
        - Virtual Screening
        - Similarity
        - Multi-Target
        - Multi-Label Classification
        - Multi-Task
        - Bioactivity
        - Classification
        - MUV
        - PubChem
        - QSAR
        - Benchmark
        - Unbiased
        target_descriptions:
            '0': MUV_466 - MUV AID 466 (PubChem BioAssay)
