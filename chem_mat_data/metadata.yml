    bl_chembl_reg:
        compounds: 52484
        description: 'The Briem & Lessel ChEMBL Multi-Target Regression Dataset is
            a modern recreation of the classic Briem and Lessel dataset (originally
            published in 2000) using ChEMBL25 data. Each molecule has a 35-dimensional
            target vector, where each dimension corresponds to one of 35 biological
            targets (GPCRs, kinases, proteases, etc.) from ChEMBL. The values are
            pKi (negative log of Ki binding affinity in molar units), with NaN indicating
            missing measurements. This enables multi-task regression where a single
            molecule can have measured affinities for multiple targets simultaneously.
            Higher pKi values indicate stronger binding. Typical range: 4.0-12.0 for
            measured values. This dataset is specifically designed for multi-task
            QSAR modeling and validating similarity-based virtual screening methods.'
        raw:
        - csv
        sources:
        - https://rdkit.blogspot.com/2019/10/a-new-lessel-and-briem-like-dataset.html
        - https://github.com/greglandrum/rdkit_blog/tree/master/data
