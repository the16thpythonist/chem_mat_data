    riniker_1:
        compounds: 168326
        description: 'The RDKit Benchmarking Platform Subset I is a comprehensive
            multi-target classification dataset containing 88 biological targets from
            three public data sources: MUV (Maximum Unbiased Validation, 17 targets),
            DUD (Directory of Useful Decoys, 21 targets), and ChEMBL (50 targets).
            Originally published by Riniker & Landrum (2013), this dataset is designed
            for evaluating molecular similarity methods and virtual screening approaches.
            Each molecule has an 88-dimensional target vector where each position
            can have three values: 0 (not mentioned for that target), 1 (active against
            that target), or 2 (decoy for that target). This tri-state encoding properly
            captures the per-target nature of the decoy selection, where a molecule
            can be active against one target while serving as a decoy for another.
            Decoys are specifically selected for each target using methods like DUD
            (Directory of Useful Decoys) which matches physical properties while avoiding
            structural similarity to actives. This enables both multi-task learning
            and proper evaluation of similarity-based virtual screening methods with
            target-specific negative examples.'
        notes:
        - This is a virtual screening benchmark dataset designed for evaluating molecular
            similarity methods.
        - 'Target vectors use tri-state encoding: 0 = not mentioned for that target,
            1 = active against that target, 2 = decoy for that target.'
        - Decoys are specifically selected for each target to match physical properties
