    skin_irritation:
        compounds: 1263
        description: The skin irritation dataset contains 1,012 curated compounds
            focused on predicting the skin irritation and corrosion potential of small
            organic molecules. Experimental animal data were retrieved from the Registration,
            Evaluation, Authorization and Restriction of Chemicals (REACH) study results
            database and curated as part of the STopTox study by Borba et al. (2022),
            published in Environmental Health Perspectives. The dataset comprises
            317 skin irritants and 695 non-irritants, providing a binary classification
            benchmark for developing in silico alternatives to animal testing. This
            dataset supports the development of QSAR models and machine learning approaches
            for predicting topical toxicity endpoints, contributing to the 3Rs principles
            (Replacement, Reduction, and Refinement) in chemical safety assessment.
        raw:
        - csv
        sources:
        - https://db.chempharos.eu/datasets/Datasets.zul?datasetID=ds14
        - https://ehp.niehs.nih.gov/doi/10.1289/EHP9341
        - https://pubmed.ncbi.nlm.nih.gov/35192406/
        - https://pmc.ncbi.nlm.nih.gov/articles/PMC8863177/
        - https://stoptox.mml.unc.edu/
        tags:
        - Molecules
        - SMILES
        - Biology
        - Toxicity
        - Skin Irritation
        - REACH
        - QSAR
        - Alternative Methods
        target_descriptions:
            '0': Non-irritant - Compound does not cause skin irritation or corrosion
            '1': Skin irritant - Compound causes skin irritation or corrosion based
                on experimental data
        target_type:
        - classification
        targets: 2
        verbose: Skin Irritation and Corrosion
    skin_sensitizers:
        compounds: 1263
        description: The skin sensitization dataset contains 1,000 curated compounds
            focused on predicting the skin sensitization potential of small organic
            molecules. Data were sourced from the Interagency Coordinating Committee
            on the Validation of Alternative Methods (ICCVAM) and the Registration,
            Evaluation, Authorization and Restriction of Chemicals (REACH) study results
            databases. The dataset was curated as part of the STopTox study by Borba
            et al. (2022), published in Environmental Health Perspectives, and is
            also integrated into the Pred-Skin web portal (Borba et al., 2020). The
            dataset comprises 481 skin sensitizers and 519 non-sensitizers, providing
            a binary classification benchmark for developing in silico alternatives
            to animal testing. This dataset supports the development of QSAR models
            and machine learning approaches for predicting skin sensitization hazard,
            contributing to the 3Rs principles (Replacement, Reduction, and Refinement)
            in chemical safety assessment and aligning with the OECD adverse outcome
            pathway (AOP) framework for skin sensitization.
        raw:
        - csv
        sources:
        - https://db.chempharos.eu/datasets/Datasets.zul?datasetID=ds15
        - https://ehp.niehs.nih.gov/doi/10.1289/EHP9341
