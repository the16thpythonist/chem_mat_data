    bl_chembl_cls:
        compounds: 8780
        description: "The Briem & Lessel ChEMBL Multi-Target Classification Dataset\
            \ is a modern recreation of the classic Briem and Lessel dataset (originally\
            \ published in 2000) using ChEMBL25 data. This multi-label classification\
            \ version contains two classes: (1) selected high-potency active compounds\
            \ from the curated selected_actives file, and (2) decoy compounds assumed\
            \ to be inactive. Each molecule has a 35-dimensional tri-state target\
            \ activity vector where each position can have three values: 0 (not mentioned),\
            \ 1 (active), or 2 (decoy). For selected actives, a 1 in position i indicates\
            \ the molecule is a high-potency active (Ki \u2264 1nM) against target\
            \ i. For decoys, all positions are set to 2, indicating the molecule is\
            \ assumed to be inactive (a decoy) against all 35 targets. This tri-state\
            \ encoding enables multi-label multi-target activity prediction where\
            \ a single molecule can be active against multiple targets simultaneously,\
            \ with explicit decoy identification."
        notes:
        - This is a virtual screening benchmark dataset derived from ChEMBL25 for
            evaluating molecular similarity methods.
        - "Target vectors use tri-state encoding: 0 = not mentioned for that target,\
            \ 1 = active (high-potency, Ki \u2264 1nM) against that target, 2 = decoy\
            \ for that target."
        - Decoys are shared compounds assumed to be inactive against all 35 targets.
        - All decoy molecules have value 2 for all target positions (assumed inactive
            against all targets).
        - "Active compounds are high-potency selected actives (Ki \u2264 1nM) from\
            \ ChEMBL."
        raw:
        - csv
        sources:
        - https://rdkit.blogspot.com/2019/10/a-new-lessel-and-briem-like-dataset.html
        - https://github.com/greglandrum/rdkit_blog/tree/master/data
        - https://doi.org/10.1021/ci000197k
        tags:
        - Molecules
