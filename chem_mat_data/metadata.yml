    riniker_1_filtered:
        compounds: 105294
        description: 'The RDKit Benchmarking Platform Subset I Filtered is a difficulty-filtered
            multi-target classification dataset containing 69 biological targets from
            three public data sources: MUV (Maximum Unbiased Validation, 16 targets),
            DUD (Directory of Useful Decoys, 3 targets), and ChEMBL (50 targets).
            Originally published by Riniker & Landrum (2013) and filtered in Riniker,
            Fechner & Landrum (2013), this dataset keeps only targets with AUC(ECFC0)
            < 0.8 to focus on more challenging virtual screening scenarios. Each molecule
            has a 69-dimensional target vector where each position can have three
            values: 0 (not mentioned for that target), 1 (active against that target),
            or 2 (decoy for that target). This tri-state encoding properly captures
            the per-target nature of the decoy selection, where a molecule can be
            active against one target while serving as a decoy for another. Decoys
            are specifically selected for each target using methods like DUD which
            matches physical properties while avoiding structural similarity to actives.
            This enables both multi-task learning and proper evaluation of similarity-based
            virtual screening methods on more difficult targets with target-specific
            negative examples.'
        notes:
        - This is a virtual screening benchmark dataset designed for evaluating molecular
            similarity methods.
        - 'Target vectors use tri-state encoding: 0 = not mentioned for that target,
            1 = active against that target, 2 = decoy for that target.'
        - Decoys are specifically selected for each target to match physical properties
            while avoiding structural similarity to actives.
        - A molecule can be active against some targets while serving as a decoy for
            others, capturing the per-target nature of the data.
        - This filtered subset contains only difficult targets (AUC(ECFC0) < 0.8)
            for more challenging virtual screening scenarios.
