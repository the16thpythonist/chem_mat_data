    dud_e:
        compounds: 400040
        description: 'The DUD-E (Directory of Useful Decoys - Enhanced) dataset is
            a comprehensive multi-target virtual screening benchmark containing 102
            protein targets with 22,886 active compounds and over 1 million carefully
            selected decoys. Published by Mysinger et al. (2012), this dataset is
            designed to benchmark molecular docking programs and similarity-based
            virtual screening methods. Each molecule has a 102-dimensional target
            vector where each position can have three values: 0 (not mentioned for
            that target), 1 (active against that target), or 2 (decoy for that target).
            This tri-state encoding properly captures the per-target nature of the
            decoy selection, where a molecule can be active against one target while
            serving as a decoy for another. Decoys are specifically selected for each
            target with a 50:1 ratio, matched for physicochemical properties while
            maintaining 2-D structural dissimilarity to actives. This enables both
            multi-task learning and proper evaluation of similarity-based virtual
            screening methods with target-specific negative examples.'
        notes:
        - This is a virtual screening benchmark dataset designed for evaluating molecular
            docking and similarity methods.
        - 'Target vectors use tri-state encoding: 0 = not mentioned for that target,
            1 = active against that target, 2 = decoy for that target.'
        - Decoys are specifically selected for each target (50:1 ratio) to match physicochemical
            properties while avoiding 2-D structural similarity to actives.
        - A molecule can be active against some targets while serving as a decoy for
            others, capturing the per-target nature of the data.
        - "Active compounds have measured affinities \u22641 \u03BCM against their\
            \ targets, extracted from ChEMBL09 database."
        raw:
        - csv
        sources:
        - https://dude.docking.org/
        - https://doi.org/10.1021/jm300687e
        - http://jmc.acs.org/content/55/14/6582
        tags:
        - Molecules
        - SMILES
        - Drug Discovery
        - Virtual Screening
        - Similarity
        - Multi-Target
        - Multi-Label Classification
        - Multi-Task
        - Bioactivity
        - Classification
        - DUD-E
        - QSAR
        - Benchmark
        - Molecular Docking
