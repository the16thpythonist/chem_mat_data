    riniker_2:
        compounds: 20922
        description: 'The RDKit Benchmarking Platform Subset II is a multi-target
            classification dataset containing 37 biological targets from ChEMBL. This
            extended version was published by Riniker, Fechner & Landrum (2013) to
            evaluate a different virtual screening use case with diverse active sets
            (100 actives per target). Each molecule has a 37-dimensional target vector
            where each position can have three values: 0 (not mentioned for that target),
            1 (active against that target), or 2 (decoy for that target). This tri-state
            encoding properly captures the per-target nature of the decoy selection,
            where a molecule can be active against one target while serving as a decoy
            for another. Decoys are shared ZINC compounds (10,000 total) selected
            for all ChEMBL targets to match physical properties while avoiding structural
            similarity to actives. This enables both multi-task learning and proper
            evaluation of similarity-based virtual screening methods with target-specific
            negative examples.'
        notes:
        - This is a virtual screening benchmark dataset designed for evaluating molecular
            similarity methods.
        - 'Target vectors use tri-state encoding: 0 = not mentioned for that target,
            1 = active against that target, 2 = decoy for that target.'
        - Decoys are shared ZINC compounds selected to match physical properties while
            avoiding structural similarity to actives.
        - All decoy molecules have value 2 for all 37 ChEMBL targets (assumed inactive
            against all targets).
