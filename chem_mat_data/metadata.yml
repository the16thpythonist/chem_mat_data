    compas_1x:
        compounds: 34072
        description: The COMPAS-1x dataset is part of the COMPAS Project, a computational
            database of polycyclic aromatic systems. This dataset contains optimized
            ground-state structures and molecular properties for approximately 34,000
            cata-condensed polybenzenoid hydrocarbons (also known as polycyclic aromatic
            hydrocarbons or PAHs), computed at the GFN2-xTB level of theory. The dataset
            covers molecules ranging from 1 to 11 rings and includes key quantum chemical
            properties such as HOMO/LUMO energies, energy gaps, dipole moments, and
            electron affinities. This resource supports data-driven investigation
            of structure-property relationships in aromatic systems and facilitates
            machine learning applications in organic electronics and materials design.
        raw:
        - csv
        sources:
        - https://pubs.acs.org/doi/full/10.1021/acs.jcim.2c00503
        - https://pubmed.ncbi.nlm.nih.gov/35881922/
        - https://chemrxiv.org/engage/chemrxiv/article-details/626836b8368ab655418e3c7f
        - https://acs.figshare.com/collections/The_COMPAS_Project_A_Computational_Database_of_Polycyclic_Aromatic_Systems_Phase_1_i_cata_i_-Condensed_Polybenzenoid_Hydrocarbons/6118490
        - https://gitlab.com/porannegroup/compas/-/tree/main/COMPAS-1?ref_type=heads
        tags:
        - SMILES
        - Molecules
        - Quantum Chemistry
        - Molecular Properties
        - Polycyclic Aromatic Hydrocarbons
        - PAH
        - GFN2-xTB
        target_descriptions:
            0: HOMO_eV - Energy of the highest occupied molecular orbital (HOMO) in
                electron volts (eV)
            1: LUMO_eV - Energy of the lowest unoccupied molecular orbital (LUMO)
                in electron volts (eV)
            2: GAP_eV - HOMO-LUMO energy gap in electron volts (eV)
            3: Dipmom_Debye - Dipole moment in Debye units
            4: Etot_eV - Total energy of the molecule in electron volts (eV)
            5: aEA_eV - Adiabatic electron affinity in electron volts (eV)
            6: aIP_eV - Adiabatic ionization potential in electron volts (eV)
            7: NFOD - Fractional occupation density (indicator of polyradical character)
            8: n_rings - Number of aromatic rings in the molecule
        target_type:
        - regression
        targets: 9
        verbose: Cata-Condensed Polybenzenoid Hydrocarbons (COMPAS-1x)
    compas_3x:
        compounds: 39482
        description: The COMPAS-3x dataset is the third installment of the COMPAS
            Project, a computational database of polycyclic aromatic systems, focused
            on peri-condensed polybenzenoid hydrocarbons. This dataset contains optimized
            ground-state structures and molecular properties for approximately 39,482
            peri-condensed polybenzenoid hydrocarbons, computed at the GFN2-xTB level
            of theory. Peri-condensed systems differ from cata-condensed systems in
            that they contain carbon atoms shared by three or more rings. The dataset
            covers molecules ranging from 1 to 10 rings and includes key quantum chemical
            properties such as HOMO/LUMO energies, energy gaps, dipole moments, and
            electron affinities. Data-driven analysis reveals structure-property trends,
            particularly the effect of peri-condensed island size and linearly annulated
            rings on the HOMO-LUMO gap. This resource supports machine learning applications
            in chemistry and the design of functional aromatic molecules for organic
            electronics.
        raw:
        - csv
        sources:
        - https://pubs.rsc.org/en/content/articlelanding/2024/cp/d4cp01027b
        - https://pubmed.ncbi.nlm.nih.gov/38758092/
        - https://chemrxiv.org/engage/chemrxiv/article-details/65d8c60ae9ebbb4db90f6276
        - https://www.research-collection.ethz.ch/handle/20.500.11850/674707
        - https://gitlab.com/porannegroup/compas/-/tree/main/COMPAS-3?ref_type=heads
        tags:
        - SMILES
        - Molecules
        - Quantum Chemistry
        - Molecular Properties
        - Polycyclic Aromatic Hydrocarbons
        - PAH
        - GFN2-xTB
        - Peri-Condensed
        target_descriptions:
            0: HOMO_eV - Energy of the highest occupied molecular orbital (HOMO) in
                electron volts (eV)
            1: LUMO_eV - Energy of the lowest unoccupied molecular orbital (LUMO)
                in electron volts (eV)
            2: GAP_eV - HOMO-LUMO energy gap in electron volts (eV)
            3: Dipmom_Debye - Dipole moment in Debye units
            4: Etot_eV - Total energy of the molecule in electron volts (eV)
            5: aEA_eV - Adiabatic electron affinity in electron volts (eV)
            6: aIP_eV - Adiabatic ionization potential in electron volts (eV)
            7: NFOD - Fractional occupation density (indicator of polyradical character)
            8: n_rings - Number of aromatic rings in the molecule
        target_type:
        - regression
        targets: 9
        verbose: Peri-Condensed Polybenzenoid Hydrocarbons (COMPAS-3x)
